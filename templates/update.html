<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Blog Post</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="form-card">
            <h1>Update Blog Post</h1>
            <p class="subtitle">Fill out the form below to update your post.</p>

            <form action="{{ url_for('update', post_id=post['id']) }}" method="POST" class="blog-form">
                <label for="author">Author</label>
                <input type="text" id="author" name="author" value="{{ post['author'] }}" required>

                <label for="title">Title</label>
                <input type="text" id="title" name="title" value="{{ post['title'] }}" required>

                <label for="content">Content</label>
                <textarea id="content" name="content" rows="8" required>{{ post['content'] }}</textarea>

                <div class="form-actions">
                    <a class="secondary-button" href="{{ url_for('index') }}">Back to Home</a>
                    <button type="submit">Update</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
