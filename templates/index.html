<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Flask Blog</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="page-header">
            <div>
                <h1>Welcome to My Flask Blog!</h1>
            </div>
            <a class="primary-link" href="{{ url_for('add') }}">+ Add New Post</a>
        </div>

        {% for post in posts %}
            <div class="post">
                <h2>{{ post.title }}</h2>
                <p class="author"><em>Written by: {{ post.author }}</em></p>
                <p>{{ post.content }}</p>

                <div class="post-actions">
                    <a class="secondary-button" href="{{ url_for('update', post_id=post['id']) }}">Update Post</a>
                    <a class="delete-link" href="{{ url_for('delete', post_id=post['id']) }}">Delete Post</a>
                </div>
            </div>
        {% endfor %}
    </div>
</body>
</html>
