<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Blog Post</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="form-card">
            <h1>Add a New Blog Post</h1>
            <p class="subtitle">Fill out the form below to publish a new post.</p>

            <form action="/add" method="POST" class="blog-form">
                <label for="author">Author</label>
                <input type="text" id="author" name="author" placeholder="Enter author name" required>

                <label for="title">Title</label>
                <input type="text" id="title" name="title" placeholder="Enter post title" required>

                <label for="content">Content</label>
                <textarea id="content" name="content" rows="8" placeholder="Write your blog post here..." required></textarea>

                <div class="form-actions">
                    <a class="secondary-button" href="{{ url_for('index') }}">Back to Home</a>
                    <button type="submit">Publish Post</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
